name: Deploy to GitHub Pages

# Publishes the static site whenever this branch (or main) is updated.
on:
  push:
    branches:
      - main
      - claude/background-audio-player-mvpwvp
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically (source = GitHub Actions) so no manual
          # repo-settings toggle is needed.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the site (static files at the root).
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
